<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cat-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayla Heath</title>
    <script>
      // Apply saved theme before paint to avoid a flash. Frappé (dark) is the default.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'light') {
            document.documentElement.dataset.theme = 'light'
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
